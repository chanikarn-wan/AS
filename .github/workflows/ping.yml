name: Keep Hugging Face Space Alive

on:
  schedule:
    # ตั้งเวลาให้ทำงานทุกๆ นาทีที่ 0 ของทุกชั่วโมง (เช่น 13:00, 14:00, 15:00)
    - cron: '0 * * * *'
  # เปิดปุ่มสำหรับกดสั่งให้รันเองแมนนวลเพื่อทดสอบได้
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip install requests

    - name: Run ping script
      env:
        # ดึงลิงก์ความลับที่เราตั้งค่าไว้มาใช้
        HF_SPACE_URL: ${{ secrets.HF_SPACE_URL }}
      run: python keep_alive.py
